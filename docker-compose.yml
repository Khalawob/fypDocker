version: "3.9"

services:
  mysql:
    image: mysql:8
    container_name: flashcard_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fyp
    volumes:
      - mysql_data:/var/lib/mysql #Save mysql data so it dosent vanish when container is removed
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql #file for creating database
    ports:
      - "3306:3306"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000
      - CHOKIDAR_USEPOLLING=true
      # Helps file watching on Windows/WSL/Docker Desktop
      - WATCHPACK_POLLING=true
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      - backend

  backend:
    build: ./server
    container_name: flashcard_backend
    ports:
      - "5000:5000"
    depends_on:
      - mysql
      - nlp
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: fyp
      JWT_SECRET: super_secret_change_me
      NLP_URL: "http://nlp:6000"

  nlp:
    build: ./nlp-service
    container_name: flashcard_nlp
    ports:
      - "6000:6000"

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: flashcard_phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - "8080:80"
    depends_on:
      - mysql

# Define named volumes for saving MySQL data      
volumes:
  mysql_data:
